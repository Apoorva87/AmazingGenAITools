  #sidebar .subtitle { font-size: 12px; color: #94a3b8; margin-bottom: 16px; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .stat-card { background: #0f172a; border-radius: 8px; padding: 10px; text-align: center; }
  .stat-card .number { font-size: 24px; font-weight: 700; color: #f8fafc; }
  .stat-card .label { font-size: 10px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }

  .section-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: #64748b; margin: 16px 0 8px; font-weight: 600; }

  .cluster-item { display: flex; align-items: center; gap: 8px; padding: 8px; border-radius: 6px; cursor: pointer; margin-bottom: 4px; transition: background 0.15s; }
  .cluster-item:hover { background: #334155; }
  .cluster-item.active { background: #334155; border: 1px solid #475569; }
  .cluster-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .cluster-name { font-size: 13px; flex: 1; }
  .cluster-count { font-size: 11px; color: #64748b; }

  .filter-group { margin-bottom: 12px; }
  .filter-group label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 4px; }
  .filter-group input { width: 100%; padding: 6px 10px; border-radius: 6px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 13px; }
  .filter-group input:focus { outline: none; border-color: #6366f1; }

  .type-filters { display: flex; gap: 6px; margin-bottom: 12px; }
  .type-btn { padding: 4px 10px; border-radius: 12px; border: 1px solid #334155; background: transparent; color: #94a3b8; font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .type-btn.active { background: #334155; color: #f8fafc; border-color: #475569; }
  .type-btn:hover { border-color: #475569; }

  /* Detail Panel */
  #detail { display: none; position: absolute; right: 16px; top: 16px; width: 360px; max-height: calc(100vh - 32px); background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 20px; overflow-y: auto; z-index: 10; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
  #detail h2 { font-size: 16px; margin-bottom: 4px; color: #f8fafc; }
  #detail .meta { font-size: 12px; color: #94a3b8; margin-bottom: 12px; }
  #detail .badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; margin-right: 4px; }
  #detail .badge-concept { background: #312e81; color: #a5b4fc; }
  #detail .badge-resource { background: #064e3b; color: #6ee7b7; }
  #detail .badge-note { background: #713f12; color: #fde68a; }
  #detail .section { margin-top: 12px; }
  #detail .section h3 { font-size: 12px; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
  #detail .link-item { padding: 4px 0; font-size: 13px; }
  #detail .link-item a { color: #93c5fd; text-decoration: none; }
  #detail .link-item a:hover { text-decoration: underline; }
  #detail .question { padding: 4px 0; font-size: 13px; color: #cbd5e1; }
  #detail .edge-item { padding: 4px 0; font-size: 12px; color: #94a3b8; }
  #detail .edge-rel { color: #6366f1; font-weight: 600; }
  #detail .close-btn { position: absolute; top: 12px; right: 12px; background: none; border: none; color: #64748b; cursor: pointer; font-size: 18px; }
  #detail .close-btn:hover { color: #f8fafc; }
  #detail .url-link { display: block; margin-top: 8px; padding: 8px 12px; background: #0f172a; border-radius: 6px; color: #93c5fd; text-decoration: none; font-size: 13px; word-break: break-all; }
  #detail .url-link:hover { background: #1e3a5f; }

  /* Graph Area */
  #graph-area { flex: 1; position: relative; }
  svg { width: 100%; height: 100%; }
  .link { stroke-opacity: 0.3; }
  .link:hover { stroke-opacity: 0.8; }
  .node { cursor: pointer; }
  .node circle { stroke: #0f172a; stroke-width: 1.5px; transition: r 0.2s; }
  .node:hover circle { r: 12; }
  .node text { font-size: 9px; fill: #94a3b8; pointer-events: none; }
  .node.highlighted circle { stroke: #f8fafc; stroke-width: 2.5px; }
  .node.dimmed { opacity: 0.15; }
  .link.dimmed { opacity: 0.05; }

  /* Legend */
  #legend { position: absolute; bottom: 16px; left: 16px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 12px; font-size: 11px; }
  .legend-item { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; }
  .legend-line { width: 20px; height: 2px; }
</style>
</head>

// Stats

document.getElementById('stat-clusters').textContent = clusterData.length;

// Cluster list
const clusterList = document.getElementById('cluster-list');
clusterData.sort((a, b) => b.total - a.total).forEach(c => {
  const div = document.createElement('div');
  div.className = 'cluster-item';
  div.dataset.cluster = c.id;
  div.innerHTML = `<div class="cluster-dot" style="background:${c.color}"></div><span class="cluster-name">${c.name}</span><span class="cluster-count">${c.total}</span>`;
  div.onclick = () => filterByCluster(c.id);
  clusterList.appendChild(div);
});

// D3 Graph
const svg = d3.select('#graph');
const width = document.getElementById('graph-area').clientWidth;
const height = document.getElementById('graph-area').clientHeight;

const simulation = d3.forceSimulation(graphData.nodes)
  .force('link', d3.forceLink(graphData.links).id(d => d.id).distance(d => {
    if (d.relationship === 'learned_from') return 60;
    return 100;
  }).strength(d => d.weight * 0.3))
  .force('charge', d3.forceManyBody().strength(-120))
  .force('center', d3.forceCenter(width / 2, height / 2))
  .force('collision', d3.forceCollide().radius(d => d.size + 3));

const g = svg.append('g');

// Zoom
svg.call(d3.zoom()
  .scaleExtent([0.2, 5])
  .on('zoom', (event) => g.attr('transform', event.transform)));

// Relationship colors
const relColors = {
  'learned_from': '#475569',
  'extends': '#f59e0b',
  'depends_on': '#ef4444',
  'enables': '#10b981',
  'contains': '#6366f1',
  'specializes': '#8b5cf6',
  'related_to': '#64748b',
  'contrasts_with': '#f97316',
  'similar_to': '#06b6d4',
};

const link = g.append('g')
  .selectAll('line')
  .data(graphData.links)
  .join('line')
  .attr('class', 'link')
  .attr('stroke', d => relColors[d.relationship] || '#475569')
  .attr('stroke-width', d => Math.max(1, d.weight * 2.5));

const node = g.append('g')
  .selectAll('g')
  .data(graphData.nodes)
  .join('g')
  .attr('class', 'node')
  .call(d3.drag()
    .on('start', dragstarted)
    .on('drag', dragged)
    .on('end', dragended))
  .on('click', (event, d) => showDetail(d))
  .on('mouseover', (event, d) => highlightConnected(d))
  .on('mouseout', () => resetHighlight());

node.append('circle')
  .attr('r', d => d.size)
  .attr('fill', d => d.color);

node.append('text')
  .attr('dx', d => d.size + 4)
  .attr('dy', 3)
  .text(d => d.type === 'concept' ? d.name : (d.name.length > 25 ? d.name.slice(0, 25) + '...' : d.name));

simulation.on('tick', () => {
  link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
  node.attr('transform', d => `translate(${d.x},${d.y})`);
});

function dragstarted(event) { if (!event.active) simulation.alphaTarget(0.3).restart(); event.subject.fx = event.subject.x; event.subject.fy = event.subject.y; }
function dragged(event) { event.subject.fx = event.x; event.subject.fy = event.y; }
function dragended(event) { if (!event.active) simulation.alphaTarget(0); event.subject.fx = null; event.subject.fy = null; }

// Highlight
function highlightConnected(d) {
  const connected = new Set();
  connected.add(d.id);
  graphData.links.forEach(l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    if (sid === d.id) connected.add(tid);
    if (tid === d.id) connected.add(sid);
  });
  node.classed('dimmed', n => !connected.has(n.id));
  node.classed('highlighted', n => n.id === d.id);
  link.classed('dimmed', l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    return !connected.has(sid) || !connected.has(tid);
  });
}

function resetHighlight() {
  node.classed('dimmed', false).classed('highlighted', false);
  link.classed('dimmed', false);
}

// Detail panel
function showDetail(d) {
  const panel = document.getElementById('detail');
  const content = document.getElementById('detail-content');

  const badgeClass = `badge-${d.type}`;
  let html = `<h2>${d.name}</h2>`;
  html += `<div class="meta"><span class="badge ${badgeClass}">${d.type}</span>`;
  if (d.depth) html += `<span class="badge ${badgeClass}">${d.depth}</span>`;
  if (d.resource_type) html += `<span class="badge ${badgeClass}">${d.resource_type}</span>`;
  if (d.quality) html += ` ${' ⭐'.repeat(d.quality)}`;
  html += `</div>`;

  if (d.url) html += `<a class="url-link" href="${d.url}" target="_blank">🔗 ${d.url}</a>`;
  if (d.body) html += `<div class="section"><p style="font-size:13px;color:#cbd5e1">${d.body}</p></div>`;

  if (d.questions && d.questions.length) {
    html += `<div class="section"><h3>Key Questions</h3>`;
    d.questions.forEach(q => html += `<div class="question">❓ ${q}</div>`);
    html += `</div>`;
  }

  // Edges
  const outEdges = graphData.links.filter(l => (typeof l.source === 'object' ? l.source.id : l.source) === d.id);
  const inEdges = graphData.links.filter(l => (typeof l.target === 'object' ? l.target.id : l.target) === d.id);

  if (outEdges.length || inEdges.length) {
    html += `<div class="section"><h3>Connections</h3>`;
    outEdges.forEach(e => {
      const targetName = (typeof e.target === 'object' ? e.target.name : e.target);
      html += `<div class="edge-item"><span class="edge-rel">${e.relationship}</span> → ${targetName}</div>`;
    });
    inEdges.forEach(e => {
      const sourceName = (typeof e.source === 'object' ? e.source.name : e.source);
      html += `<div class="edge-item">${sourceName} → <span class="edge-rel">${e.relationship}</span></div>`;
    });
    html += `</div>`;
  }

  if (d.tags && d.tags.length) {
    html += `<div class="section"><h3>Tags</h3><p style="font-size:12px;color:#94a3b8">${d.tags.join(', ')}</p></div>`;
  }

  content.innerHTML = html;
  panel.style.display = 'block';
}

function closeDetail() { document.getElementById('detail').style.display = 'none'; }

// Search
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase();
  if (!q) { resetHighlight(); return; }
  const matches = new Set();
  graphData.nodes.forEach(n => {
    if (n.name.toLowerCase().includes(q) || n.tags.some(t => t.includes(q))) matches.add(n.id);
  });
  node.classed('dimmed', n => !matches.has(n.id));
  link.classed('dimmed', () => true);
});

// Type filter
document.querySelectorAll('.type-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    const type = this.dataset.type;
    if (type === 'all') { node.classed('dimmed', false); link.classed('dimmed', false); return; }
    node.classed('dimmed', n => n.type !== type);
    link.classed('dimmed', () => true);
  });
});

// Cluster filter
let activeCluster = null;
function filterByCluster(cid) {
  document.querySelectorAll('.cluster-item').forEach(el => el.classList.remove('active'));
  if (activeCluster === cid) { activeCluster = null; resetHighlight(); return; }
  activeCluster = cid;
  document.querySelector(`.cluster-item[data-cluster="${cid}"]`).classList.add('active');
  const inCluster = new Set();
  graphData.nodes.forEach(n => {
    if (n.cluster === cid) inCluster.add(n.id);
  });
  node.classed('dimmed', n => !inCluster.has(n.id));
  link.classed('dimmed', l => {
    const sid = typeof l.source === 'object' ? l.source.id : l.source;
    const tid = typeof l.target === 'object' ? l.target.id : l.target;
    return !inCluster.has(sid) || !inCluster.has(tid);
  });
}

// Click outside to deselect
svg.on('click', function(event) {
  if (event.target.tagName === 'svg') { closeDetail(); resetHighlight(); }
});
